<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pela Assinatura | Merece Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0A1128; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 3rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); max-width: 400px; }
        h1 { color: #2ecc71; margin-bottom: 1rem; }
        p { margin-bottom: 2rem; opacity: 0.9; }
        .btn { background: #2ecc71; color: white; padding: 0.8rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #27ae60; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Deu tudo certo!</h1>
        <p>Sua assinatura foi processada. Em instantes você receberá os detalhes no seu e-mail.</p>
        <a href="/" class="btn">Voltar ao Início</a>
    </div>
</body>
</html>
