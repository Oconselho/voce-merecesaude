        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A1128">

    <style>
        .scheduling-info {
            margin-top: 1.5rem;
            border-radius: 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 1.25rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .scheduling-info p {
            margin: 0;
            color: rgba(255,255,255,0.85);
            font-size: 0.82rem;
            text-align: center;
            line-height: 1.5;
        }
        .scheduling-info p strong {
            color: #4DD9AC;
        }
        .scheduling-info img {
            width: 100%;
            max-width: 280px;
            border-radius: 12px;
            border: 1px solid rgba(77,217,172,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="device-mockup">
        <main class="login-container">
            <header class="logo-section"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
                <img src="https://5928b1d78fbd2630ba4e4b944b2b6eae.cdn.bubble.io/f1755711769220x715877365147272100/ESCUDO%20PNG.png"
                    alt="Coração Merece Saúde" class="logo-heart">
                <div style="display: flex; flex-direction: column; align-items: center; line-height: 1.1;">
                    <span
                        style="font-size: 2.2rem; font-weight: 300; letter-spacing: 2px; color: var(--text-white);">Você</span>
                    <span
                        style="font-size: 2.4rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-teal), var(--primary-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Merece
                        Saúde</span>
                </div>
            </header>

            <div class="portal-actions glass-panel">

                <a href="https://merecesaude.com.br/login/" class="btn-primary" id="btn-login-direct">
                    Entrar na Área do Cliente
                </a>

                <div class="scheduling-info">
                    <p>
                        Todo agendamento de consultas deve ser realizado<br>
                        <strong>dentro da Área do Cliente</strong>, após o login,<br>
                        utilizando o <strong>botão de chat</strong> disponível na plataforma.
                    </p>
                    <img src="https://5928b1d78fbd2630ba4e4b944b2b6eae.cdn.bubble.io/f1755711769220x715877365147272100/ESCUDO%20PNG.png"
                        alt="Botão de agendamento via chat na Área do Cliente"
                        id="img-scheduling-guide"
                        style="display:none;">
                </div>

            </div>
        </main>
